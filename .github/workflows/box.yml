name: Build Firefox Windows Release
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Support Long Paths
        run: |
          git config --global core.longpaths true

      - name: Configure Native Windows Virtual Memory
        shell: powershell
        run: |
          # Disable automatic pagefile management to manually override limits
          $ComputerSystem = Get-CimInstance Win32_ComputerSystem
          $ComputerSystem.AutomaticManagedPagefile = $False
          Set-CimInstance -CimInstance $ComputerSystem
          
          # Configure a fixed 12GB pagefile to protect against background out-of-memory exits
          $PageFile = Get-CimInstance Win32_PageFileSetting | Where-Object {$_.Name -like "C:\pagefile.sys"}
          if ($PageFile) {
              $PageFile.InitialSize = 12288
              $PageFile.MaximumSize = 12288
              Set-CimInstance -CimInstance $PageFile
          } else {
              New-CimInstance -ClassName Win32_PageFileSetting -Property @{Name="C:\pagefile.sys"; InitialSize=12288; MaximumSize=12288}
          }
          Write-Host "Configured native 12GB Windows virtual swap space."

      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Set Custom Firefox Version
        id: get_version
        shell: powershell
        run: |
          # Injects your text string safely inside the Windows context variable
          echo "FF_VERSION=biui_selected" >> $env:GITHUB_OUTPUT

      - name: Install MozillaBuild
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile "MozillaBuildSetup.exe"
          Start-Process -FilePath ".\MozillaBuildSetup.exe" -ArgumentList "/S" -Wait


      - name: Compile Firefox
        shell: cmd
        run: |
          ./mach build

      - name: Package Windows Binaries
        shell: powershell
        run: |
         ./mach package
          mkdir staging
          Get-ChildItem -Path . -Filter "firefox.exe" -Recurse | ForEach-Object {
              $binDir = $_.Directory.FullName
              Compress-Archive -Path "$binDir\*" -DestinationPath "staging\firefox-biui_selected-windows-x64.zip" -Force
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-win"
          name: "Firefox Windows v-biui_selected"
          body: "Automated custom-branded Firefox Windows build compiled via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: staging/firefox-biui_selected-windows-x64.zip
