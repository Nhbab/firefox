name: Build Firefox Windows Release (MSVC-Only)
on:
  workflow_dispatch:

jobs:
  build-windows-msvc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip uuid-dev

      - name: Sanitize Core Build Version
        run: |
          # Forces the internal version back to an integer to satisfy the telemetry parser
          echo -n "130.0" > browser/config/version.txt
          echo "Sanitized version.txt to 130.0 for compiler stability."

      - name: Run Firefox Bootstrap
        run: |
          # Bypasses the local toolchain/Visual Studio SDK asset validation check
          ./mach bootstrap --application-choice=browser --enable-bootstrap=no-update

      - name: Configure MSVC Mozconfig
        run: |
          echo "ac_add_options --target=x86_64-pc-windows-msvc" > .mozconfig
          echo "ac_add_options --enable-application=browser" >> .mozconfig
          echo "ac_add_options --enable-artifact-builds" >> .mozconfig
          echo "ac_add_options --disable-debug" >> .mozconfig
          echo "ac_add_options --enable-optimize" >> .mozconfig

      - name: Assemble Firefox Windows Binaries
        run: |
          ./mach build

      - name: Package Target Artifacts
        run: |
          mkdir -p staging/firefox-windows
          
          # Extracts the compiled windows binaries from the artifact architecture directory
          cp -r obj-*/dist/bin/* staging/firefox-windows/ || cp -r obj-*/dist/bin staging/firefox-windows/
          
          # Compresses the asset directory using your custom string tag
          cd staging && zip -r ../firefox-biui_selected-windows-x64.zip firefox-windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-win"
          name: "Firefox Windows v-biui_selected"
          body: "Official Firefox Windows MSVC architecture package cross-assembled on Linux via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: firefox-biui_selected-windows-x64.zip
