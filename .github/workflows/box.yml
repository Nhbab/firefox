name: Build Firefox Windows Release (No MozillaBuild)
on:
  workflow_dispatch:

jobs:
  build-windows-on-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip uuid-dev

      - name: Sanitize Core Build Version
        run: |
          # Overwrites internal version config with a valid integer to satisfy the Glean parser
          echo -n "130.0" > browser/config/version.txt
          echo "Sanitized version.txt to 130.0 for compiler compatibility."

      - name: Run Firefox Bootstrap
        run: |
          ./mach bootstrap --application-choice=browser 

      - name: Configure Cross-Compile Mozconfig
        run: |
          # Targets Windows 64-bit while running on top of a Linux OS machine
          echo "ac_add_options --target=x86_64-pc-mingw32" > .mozconfig


      - name: Compile Firefox Windows Binary
        run: |
          ./mach build

      - name: Package Windows Artifacts Manually
        run: |
          mkdir -p staging/firefox-windows
          
          # Locates the compiled windows binaries inside the linux engine output workspace
          cp -r obj-*/dist/bin/* staging/firefox-windows/ || cp -r obj-*/dist/bin staging/firefox-windows/
          
          # Use standard Linux zip utility to compress the Windows package
          cd staging && zip -r ../firefox-biui_selected-windows-x64.zip firefox-windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-win"
          name: "Firefox Windows v-biui_selected"
          body: "Automated custom-branded Firefox Windows build cross-compiled on Linux via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: firefox-biui_selected-windows-x64.zip
