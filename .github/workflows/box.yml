name: Build Firefox Windows Release
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Support Long Paths
        run: |
          git config --global core.longpaths true

      - name: Maximize Virtual Memory
        uses: alfredodor/set-swap-space@v1.0
        with:
          swap-size-gb: 12

      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Set Custom Firefox Version
        id: get_version
        shell: powershell
        run: |
          # Injects your text string safely inside the Windows context variable
          echo "FF_VERSION=biui_selected" >> $env:GITHUB_OUTPUT

      - name: Install MozillaBuild
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://mozilla.org" -OutFile "MozillaBuildSetup.exe"
          Start-Process -FilePath ".\MozillaBuildSetup.exe" -ArgumentList "/S" -Wait

      - name: Configure Mozconfig
        shell: powershell
        run: |
          $mozconfig = @"
          ac_add_options --target=x86_64-pc-mingw32
          ac_add_options --enable-application=browser
          ac_add_options --enable-artifact-builds
          ac_add_options --disable-debug
          ac_add_options --enable-optimize
          "@
          $mozconfig | Out-File -FilePath .mozconfig -Encoding ascii

      - name: Compile Firefox
        shell: cmd
        run: |
          call C:\mozilla-build\start-shell.bat cd "%cd%" && ./mach build

      - name: Package Windows Binaries
        shell: powershell
        run: |
          mkdir staging
          Get-ChildItem -Path . -Filter "firefox.exe" -Recurse | ForEach-Object {
              $binDir = $_.Directory.FullName
              Compress-Archive -Path "$binDir\*" -DestinationPath "staging\firefox-biui_selected-windows-x64.zip" -Force
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-win"
          name: "Firefox Windows v-biui_selected"
          body: "Automated custom-branded Firefox Windows build compiled via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: staging/firefox-biui_selected-windows-x64.zip
