name: Build Firefox Windows Release (MSVC Cross)
on:
  workflow_dispatch:

jobs:
  build-windows-msvc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Explicitly isolates and resets variables to block any hidden text leaks
    env:
      MOZ_APP_VERSION: "130.0"
      BUILDID: "20260622000000"
    steps:
      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip uuid-dev

      - name: Sanitize Local Code Version Files
        run: |
          # Overwrites local repository configs to protect the internal python parsers
          echo -n "130.0" > browser/config/version.txt
          echo -n "130.0" > config/milestone.txt
          echo "Sanitized all codebase version files to 130.0."

      - name: Configure Cross-Compile MSVC Mozconfig
        run: |
          # Forces the modern MSVC target signature directly on the Linux runner host
          echo "ac_add_options --target=x86_64-pc-windows-msvc" > .mozconfig
          echo "ac_add_options --enable-application=browser" >> .mozconfig
          echo "ac_add_options --enable-artifact-builds" >> .mozconfig
          echo "ac_add_options --disable-debug" >> .mozconfig
          echo "ac_add_options --enable-optimize" >> .mozconfig

      - name: Assemble Firefox Windows Binaries
        run: |
          # Cross-compiles and extracts the Windows assembly components natively
          ./mach build

      - name: Package Windows Artifacts Manually
        run: |
          mkdir -p staging/firefox-windows
          
          # Extracts the generated windows files out of the artifact directory structure
          cp -r obj-*/dist/bin/* staging/firefox-windows/ || cp -r obj-*/dist/bin staging/firefox-windows/
          
          # Use standard Linux zip utility to compress the Windows distribution folder
          cd staging && zip -r ../firefox-biui_selected-windows-x64.zip firefox-windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-win"
          name: "Firefox Windows v-biui_selected"
          body: "Automated custom-labeled Firefox Windows MSVC build cross-assembled via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: firefox-biui_selected-windows-x64.zip
