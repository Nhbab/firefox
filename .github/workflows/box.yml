name: Build Firefox Windows Vista💾
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Support Long Paths
        run: |
          git config --global core.longpaths true

      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Install MozillaBuild
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile "MozillaBuildSetup.exe"
          Start-Process -FilePath ".\MozillaBuildSetup.exe" -ArgumentList "/S" -Wait
          # Mặc định bộ công cụ sẽ được cài vào C:\mozilla-build

      - name: Build Waterfox
        shell: powershell
        run: |
          ./mach build

      - name: Package Installer
        shell: powershell
        run: |
          ./mach package

      - name: Prepare Release Artifacts
        shell: powershell
        run: |
          mkdir staging
          # Search everywhere inside the workspace for packaged zip and exe files
          Get-ChildItem -Path . -Filter *.zip -Recurse | Copy-Item -Destination staging\
          Get-ChildItem -Path . -Filter *.exe -Recurse | Copy-Item -Destination staging\
          
          # Fallback check to ensure files exist before moving to release step
          if ((Get-ChildItem staging).Count -eq 0) {
            Write-Error "No packaged build files found!"
            exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "win-v${{ github.run_number }}"
          name: "Waterfox Windows Build #${{ github.run_number }}"
          body: "Automated Windows build compiled successfully via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: staging/*
