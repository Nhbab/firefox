name: Build Firefox Windows Release
on:
  workflow_dispatch: # Cho phép kích hoạt thủ công từ iPhone

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # Quyền tạo Release công khai
    steps:
      - name: Support Long Paths
        run: |
          git config --global core.longpaths true

      - name: Configure Native Windows Virtual Memory
        shell: powershell
        run: |
          $ComputerSystem = Get-CimInstance Win32_ComputerSystem
          $ComputerSystem.AutomaticManagedPagefile = $False
          Set-CimInstance -CimInstance $ComputerSystem
          
          $PageFile = Get-CimInstance Win32_PageFileSetting | Where-Object {$_.Name -like "C:\pagefile.sys"}
          if ($PageFile) {
              $PageFile.InitialSize = 12288
              $PageFile.MaximumSize = 12288
              Set-CimInstance -CimInstance $PageFile
          } else {
              New-CimInstance -ClassName Win32_PageFileSetting -Property @{Name="C:\pagefile.sys"; InitialSize=12288; MaximumSize=12288}
          }
          Write-Host "Configured native 12GB Windows virtual swap space."

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Sanitize Core Build Version
        shell: powershell
        run: |
          # Đồng bộ số phiên bản để bộ Glean Parser không bị lỗi ValueError
          "130.0" | Out-File -FilePath browser/config/version.txt -Encoding ascii -NoNewline
          "130.0" | Out-File -FilePath config/milestone.txt -Encoding ascii -NoNewline

      - name: Install MozillaBuild From Official URL
        shell: powershell
        run: |
          # Sử dụng chính xác URL của bạn để tải công cụ môi trường
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile "MozillaBuildSetup.exe"
          Start-Process -FilePath ".\MozillaBuildSetup.exe" -ArgumentList "/S" -Wait

      - name: Configure Mozconfig
        shell: powershell
        run: |
          $mozconfig = @"
          ac_add_options --target=x86_64-pc-mingw32
          ac_add_options --enable-application=browser
          ac_add_options --enable-artifact-builds
          ac_add_options --disable-debug
          "@
          $mozconfig | Out-File -FilePath .mozconfig -Encoding ascii

      - name: Compile Firefox using MozillaBuild
        shell: cmd
        run: |
          call C:\mozilla-build\start-shell.bat cd "%cd%" && ./mach build

      - name: Auto-Find and Package Windows Binaries
        shell: powershell
        run: |
          mkdir staging
          # Tự động lùng sục tệp firefox.exe trong mọi thư mục đối tượng được tạo ra
          Get-ChildItem -Path . -Filter "firefox.exe" -Recurse | ForEach-Object {
              $binDir = $_.Directory.FullName
              Compress-Archive -Path "$binDir\*" -DestinationPath "staging\firefox-biui_selected-windows-x64.zip" -Force
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-win"
          name: "Firefox Windows v-biui_selected"
          body: "Automated custom-branded Firefox Windows build compiled with MozillaBuild via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: staging/firefox-biui_selected-windows-x64.zip
