name: Build Waterfox Remote
on:
  workflow_dispatch: # Cho phép bạn kích hoạt thủ công từ iPhone

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python and Build Tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Waterfox Bootstrap
        run: |
          # Chạy script cấu hình môi trường của hệ thống Firefox/Waterfox
          ./mach bootstrap --application-choice=browser 

      - name: Compile Waterfox
        run: |
          ./mach build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "linux-v${{ github.run_number }}"
          name: "Waterfox Linux Build #${{ github.run_number }}"
          body: "Automated Linux build compiled successfully via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: |
            staging/*
