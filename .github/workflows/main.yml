name: Build Waterfox Remote
on:
  workflow_dispatch: # Cho phép bạn kích hoạt thủ công từ iPhone

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python and Build Tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Waterfox Bootstrap
        run: |
          # Chạy script cấu hình môi trường của hệ thống Firefox/Waterfox
          ./mach bootstrap --application-choice=browser 

      - name: Compile Waterfox
        run: |
          ./mach build
      - name: Auto-Find and Package Windows Binaries
        run: |
          mkdir -p staging/firefox-windows
          
          # Dynamically locate the main Windows executable folder inside the build space
          BIN_DIR=$(find . -type d -path "*/obj-*/dist/bin" | head -n 1)
          
          if [ -z "$BIN_DIR" ] || [ ! -f "$BIN_DIR/firefox.exe" ]; then
            echo "Error: Could not locate compiled Windows binaries!"
            exit 1
          fi
          
          echo "Found Windows binary path at: $BIN_DIR"
          cp -r "$BIN_DIR"/* staging/firefox-windows/
          cd staging && zip -r ../firefox-154.0a1-windows-x64.zip firefox-windows/


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-linux"
          name: "Firefox Linux v-biui_selected"
          body: "Automated custom-labeled Firefox Linux build compiled via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: firefox-biui_selected-linux-x64.tar.gz
