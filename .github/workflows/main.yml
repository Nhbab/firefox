name: Build Firefox Linux Release
on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MOZ_APP_VERSION: "130.0"
      BUILDID: "20260622000000"
    steps:
      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip uuid-dev

      - name: Sanitize Local Code Version Files
        run: |
          echo -n "130.0" > browser/config/version.txt
          echo -n "130.0" > config/milestone.txt
          echo "Sanitized all codebase version files to 130.0."

      - name: Configure Linux Mozconfig
        run: |
          # Creates a fresh .mozconfig optimized for the Linux artifact build
          cat << 'EOF' > .mozconfig
          ac_add_options --enable-application=browser
          ac_add_options --enable-artifact-builds
          ac_add_options --disable-debug
          EOF
          echo "=== Verified .mozconfig Contents ==="
          cat .mozconfig

      - name: Assemble Firefox Linux Binaries
        run: |
          ./mach build

      - name: Package Linux Artifacts Manually
        run: |
          mkdir -p staging/firefox-browser
          
          # Extracts the compiled linux binaries from the native object folder tree
          cp -r obj-x86_64-pc-linux-gnu/dist/bin/* staging/firefox-browser/ || cp -r obj-*/dist/bin/* staging/firefox-browser/
          
          # Compresses the browser folder under your custom tag identifier
          tar -czf firefox-biui_selected-linux-x64.tar.gz -C staging firefox-browser

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-linux"
          name: "Firefox Linux v-biui_selected"
          body: "Automated custom-labeled Firefox Linux build compiled via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: firefox-biui_selected-linux-x64.tar.gz
