name: Build Firefox Linux Release
on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Explicitly overrides and resets any global ambient environment variables
    env:
      MOZ_APP_VERSION: "130.0"
      BUILDID: "20260622000000"
    steps:
      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check and Reset Local Version Files
        run: |
          # Confirms the exact state of versioning configurations
          echo -n "130.0" > browser/config/version.txt
          echo -n "130.0" > config/milestone.txt
          
          echo "=== Active Configuration Check ==="
          echo "Source file version: $(cat browser/config/version.txt)"

      - name: Configure Mozconfig
        run: |
          echo "ac_add_options --enable-application=browser" > .mozconfig
          echo "ac_add_options --enable-artifact-builds" >> .mozconfig
          echo "ac_add_options --disable-debug" >> .mozconfig
          echo "ac_add_options --enable-optimize" >> .mozconfig

      - name: Compile Firefox
        run: |
          ./mach build

      - name: Package Firefox Binaries
        run: |
          mkdir -p staging/firefox-browser
          cp -r obj-*/dist/bin/* staging/firefox-browser/ || cp -r obj-*/dist/bin staging/firefox-browser/
          tar -czf firefox-biui_selected-linux-x64.tar.gz -C staging firefox-browser

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-linux"
          name: "Firefox Linux v-biui_selected"
          body: "Automated custom-labeled Firefox Linux build compiled via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: firefox-biui_selected-linux-x64.tar.gz
