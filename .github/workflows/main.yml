name: Build Firefox Windows Release (MSVC Cross)
on:
  workflow_dispatch:

jobs:
  build-windows-msvc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MOZ_APP_VERSION: "130.0"
      BUILDID: "20260622000000"
    steps:
      - name: Checkout Firefox Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip uuid-dev

      - name: Sanitize Local Code Version Files
        run: |
          echo -n "130.0" > browser/config/version.txt
          echo -n "130.0" > config/milestone.txt
          echo "Sanitized all codebase version files to 130.0."

      - name: Configure Cross-Compile MSVC Mozconfig
        run: |
          # Overwrite and create a fresh .mozconfig strictly for Windows target assembly
          cat << 'EOF' > .mozconfig
          ac_add_options --target=x86_64-pc-windows-msvc
          ac_add_options --enable-application=browser
          ac_add_options --enable-artifact-builds
          ac_add_options --disable-debug
          EOF
          echo "=== Verified .mozconfig Contents ==="
          cat .mozconfig

      - name: Assemble Firefox Windows Binaries
        run: |
          ./mach build

      - name: Package Windows Artifacts Manually
        run: |
          mkdir -p staging/firefox-windows
          
          # Extracts the compiled windows binaries from the newly generated msvc object directory
          cp -r obj-x86_64-pc-windows-msvc/dist/bin/* staging/firefox-windows/ || cp -r obj-*/dist/bin/* staging/firefox-windows/
          
          cd staging && zip -r ../firefox-biui_selected-windows-x64.zip firefox-windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-biui_selected-win"
          name: "Firefox Windows v-biui_selected"
          body: "Automated custom-labeled Firefox Windows MSVC build cross-assembled via iPhone 17 Pro Max."
          draft: false
          prerelease: false
          files: firefox-biui_selected-windows-x64.zip
